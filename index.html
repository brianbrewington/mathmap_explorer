<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathMap Explorer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%234a6fa5'/%3E%3Cellipse cx='16' cy='16' rx='6' ry='14' fill='none' stroke='%236b9bd2' stroke-width='1.2'/%3E%3Cline x1='2' y1='16' x2='30' y2='16' stroke='%236b9bd2' stroke-width='1.2'/%3E%3Cline x1='5' y1='9' x2='27' y2='9' stroke='%236b9bd2' stroke-width='0.8'/%3E%3Cline x1='5' y1='23' x2='27' y2='23' stroke='%236b9bd2' stroke-width='0.8'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='18' font-weight='bold' font-family='serif' fill='%23ffcc44'%3E%CF%80%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/controls.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title-row">
          <h1><svg class="logo-icon" viewBox="0 0 32 32" width="26" height="26"><circle cx="16" cy="16" r="14" fill="#4a6fa5"/><ellipse cx="16" cy="16" rx="6" ry="14" fill="none" stroke="#6b9bd2" stroke-width="1.2"/><line x1="2" y1="16" x2="30" y2="16" stroke="#6b9bd2" stroke-width="1.2"/><line x1="5" y1="9" x2="27" y2="9" stroke="#6b9bd2" stroke-width="0.8"/><line x1="5" y1="23" x2="27" y2="23" stroke="#6b9bd2" stroke-width="0.8"/><text x="16" y="23" text-anchor="middle" font-size="18" font-weight="bold" font-family="serif" fill="#ffcc44">π</text></svg> MathMap Explorer</h1>
          <button id="mute-toggle" class="mute-btn" title="Toggle sound">
            <svg class="icon-speaker" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line class="mute-slash" x1="23" y1="1" x2="1" y2="23"/>
            </svg>
          </button>
        </div>
        <p class="subtitle">Experiment, See, and Learn</p>
      </div>
      <nav id="exploration-list"></nav>
    </aside>
    <main id="main-area">
      <div id="canvas-container">
        <canvas id="render-canvas"></canvas>
        <div id="canvas-overlay" class="hidden">
          <div class="spinner"></div>
          <span id="overlay-text">Computing...</span>
        </div>
        <div id="teaser-overlay" class="teaser-hidden">
          <button id="teaser-close" aria-label="Close teaser">&times;</button>
          <p id="teaser-text"></p>
        </div>
        <!-- Info tray: slides in from right -->
        <div id="info-panel" class="collapsed">
          <button id="info-panel-toggle" title="Math & Info">&#x25C0;</button>
          <div class="info-panel-inner">
            <div class="info-panel-tabs">
              <button class="info-tab active" data-tab="formula">Overview</button>
              <button class="info-tab" data-tab="tutorial">Guide</button>
              <button class="info-tab" data-tab="related" style="display:none">Related</button>
              <button class="info-tab" data-tab="notes">Notes</button>
            </div>
            <div class="info-panel-content">
              <div id="formula-content" class="info-section active"></div>
              <div id="tutorial-content" class="info-section"></div>
              <div id="related-content" class="info-section"></div>
              <div id="notes-content" class="info-section"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="controls-panel"></div>
      <div id="chat-container"></div>
    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
